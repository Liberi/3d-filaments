<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bottom face -->
  <ellipse cx="16" cy="21" rx="13" ry="7" fill="#1a0d35" stroke="#863bff" stroke-width="2"/>

  <!-- Body side lines -->
  <line x1="3" y1="10" x2="3" y2="21" stroke="#863bff" stroke-width="2"/>
  <line x1="29" y1="10" x2="29" y2="21" stroke="#863bff" stroke-width="2"/>

  <!-- Top face with transparent hole (evenodd, 4-arc segments to avoid degenerate arcs) -->
  <path fill-rule="evenodd" fill="#1a0d35"
    d="M 16,3 A 13,7 0 0 1 29,10 A 13,7 0 0 1 16,17 A 13,7 0 0 1 3,10 A 13,7 0 0 1 16,3 Z
       M 16,7 A 5.5,3 0 0 1 21.5,10 A 5.5,3 0 0 1 16,13 A 5.5,3 0 0 1 10.5,10 A 5.5,3 0 0 1 16,7 Z"/>

  <!-- Outer ring stroke -->
  <ellipse cx="16" cy="10" rx="13" ry="7" fill="none" stroke="#863bff" stroke-width="2"/>
  <!-- Inner hole stroke -->
  <ellipse cx="16" cy="10" rx="5.5" ry="3" fill="none" stroke="#863bff" stroke-width="1.8"/>
</svg>
